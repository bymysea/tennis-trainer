<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="128" fill="#1E3A5F"/>
  
  <!-- 装饰圆环 -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#4ADE80" stroke-width="8" opacity="0.3"/>
  
  <!-- 帽子（教练帽）-->
  <g transform="translate(256, 140)">
    <!-- 帽檐 -->
    <ellipse cx="0" cy="35" rx="70" ry="15" fill="#1e3a5f" stroke="#4ade80" stroke-width="3"/>
    <!-- 帽顶 -->
    <path d="M-50 35 Q-50 -20 0 -25 Q50 -20 50 35" fill="#1e3a5f" stroke="#4ade80" stroke-width="3"/>
    <!-- 帽子上的线条 -->
    <line x1="-50" y1="35" x2="50" y2="35" stroke="#4ade80" stroke-width="3"/>
  </g>
  
  <!-- 龙虾身体 -->
  <g transform="translate(256, 280)">
    <!-- 身体主体 -->
    <ellipse cx="0" cy="0" rx="60" ry="80" fill="#E63946"/>
    <!-- 身体纹理 -->
    <path d="M-40 -20 Q0 0 40 -20" fill="none" stroke="#B91C1C" stroke-width="3"/>
    <path d="M-45 10 Q0 30 45 10" fill="none" stroke="#B91C1C" stroke-width="3"/>
    <path d="M-35 40 Q0 60 35 40" fill="none" stroke="#B91C1C" stroke-width="3"/
    
    <!-- 眼睛 -->
    <circle cx="-25" cy="-50" r="12" fill="white"/>
    <circle cx="-25" cy="-50" r="6" fill="black"/>
    <circle cx="25" cy="-50" r="12" fill="white"/>
    <circle cx="25" cy="-50" r="6" fill="black"/
    
    <!-- 触须 -->
    <path d="M-20 -75 Q-40 -110 -60 -100" fill="none" stroke="#E63946" stroke-width="4" stroke-linecap="round"/>
    <path d="M20 -75 Q40 -110 60 -100" fill="none" stroke="#E63946" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- 左螯（拿拍）-->
  <g transform="translate(180, 260)">
    <!-- 螯臂 -->
    <path d="M20 40 Q0 20 -10 0" fill="none" stroke="#E63946" stroke-width="18" stroke-linecap="round"/>
    <!-- 螯爪 -->
    <ellipse cx="-15" cy="-5" rx="20" ry="25" fill="#E63946" transform="rotate(-30)"/>
    <ellipse cx="-10" cy="5" rx="18" ry="22" fill="#DC2626" transform="rotate(-20)"/>
  </g>
  
  <!-- 网球拍 -->
  <g transform="translate(140, 200) rotate(-30)">
    <!-- 拍面外框 -->
    <ellipse cx="0" cy="0" rx="50" ry="60" fill="none" stroke="#9BC53D" stroke-width="6"/>
    <!-- 拍面内线 -->
    <ellipse cx="0" cy="0" rx="40" ry="50" fill="none" stroke="#7CB342" stroke-width="2"/>
    
    <!-- 网格竖线 -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#7CB342" stroke-width="1.5"/>
    <line x1="-20" y1="-45" x2="-20" y2="45" stroke="#7CB342" stroke-width="1"/>
    <line x1="20" y1="-45" x2="20" y2="45" stroke="#7CB342" stroke-width="1"/>
    
    <!-- 网格横线 -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#7CB342" stroke-width="1.5"/>
    <line x1="-35" y1="-25" x2="35" y2="-25" stroke="#7CB342" stroke-width="1"/>
    <line x1="-35" y1="25" x2="35" y2="25" stroke="#7CB342" stroke-width="1"/>
    
    <!-- 拍柄 -->
    <rect x="-6" y="55" width="12" height="70" rx="3" fill="#5D4037"/>
    <!-- 握把 -->
    <rect x="-7" y="110" width="14" height="30" rx="2" fill="#3E2723"/>
  </g>
  
  <!-- 右螯 -->
  <g transform="translate(330, 280)">
    <!-- 螯臂 -->
    <path d="M-10 30 Q10 10 20 -10" fill="none" stroke="#E63946" stroke-width="16" stroke-linecap="round"/>
    
    <!-- 螯爪 -->
    <ellipse cx="25" cy="-15" rx="22" ry="28" fill="#E63946" transform="rotate(20)"/>
    <ellipse cx="18" cy="-5" rx="20" ry="25" fill="#DC2626" transform="rotate(30)"/>
  </g>
  
  <!-- 底部文字 -->
  <text x="256" y="460" text-anchor="middle" fill="#4ADE80" font-family="Arial, sans-serif" font-size="28" font-weight="bold">TENNIS COACH</text>
</svg>
