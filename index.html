<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>网球进阶教练</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --card-elevated: #2c2c2e;
            --accent: #30d158;
            --accent-dark: #248a3d;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --text-tertiary: #636366;
            --separator: #38383a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        /* Header - iOS风格 */
        .header {
            background: rgba(0,0,0,0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            padding: calc(12px + env(safe-area-inset-top)) 20px 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 0.5px solid var(--separator);
        }

        .header h1 {
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            letter-spacing: -0.02em;
        }

        /* 等级显示 - iOS大标题风格 */
        .level-section {
            padding: 20px;
            text-align: center;
        }

        .level-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .level-value {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .level-target {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .level-target span {
            color: var(--accent);
            font-weight: 600;
        }

        /* iOS风格进度条 */
        .ios-progress {
            height: 4px;
            background: var(--card-elevated);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 20px 8px;
        }

        .ios-progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* 统计卡片 - iOS小组件风格 */
        .stats-section {
            padding: 0 16px 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-card {
            background: var(--card);
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.02em;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        /* Section标题 */
        .section-header {
            padding: 24px 20px 8px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* 雷达图区域 */
        .radar-section {
            padding: 0 16px 20px;
        }

        .radar-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
        }

        .radar-container {
            position: relative;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            aspect-ratio: 1;
        }

        .radar-svg {
            width: 100%;
            height: 100%;
        }

        /* 今日训练卡片 */
        .today-section {
            padding: 0 16px 20px;
        }

        .today-card {
            background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .today-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            transform: translate(30%, -30%);
        }

        .today-header {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .today-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
            letter-spacing: -0.02em;
        }

        .today-subtitle {
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .today-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: transform 0.1s;
        }

        .today-btn:active {
            transform: scale(0.98);
        }

        /* 模块网格 */
        .modules-section {
            padding: 0 16px 20px;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .module-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .module-card:active {
            background: var(--card-elevated);
            transform: scale(0.98);
        }

        .module-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .module-card.forehand .module-icon { background: rgba(255,59,48,0.15); }
        .module-card.backhand .module-icon { background: rgba(0,122,255,0.15); }
        .module-card.serve .module-icon { background: rgba(175,82,222,0.15); }
        .module-card.return .module-icon { background: rgba(255,149,0,0.15); }
        .module-card.volley .module-icon { background: rgba(48,209,88,0.15); }
        .module-card.fitness .module-icon { background: rgba(255,45,85,0.15); }

        .module-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .module-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            border-top: 0.5px solid var(--separator);
        }

        .tab-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 10px;
            padding: 4px;
            cursor: pointer;
        }

        .tab-btn.active {
            color: var(--accent);
        }

        .tab-icon {
            font-size: 22px;
        }

        /* 页面切换 */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* 训练页面 */
        .training-header {
            background: var(--card);
            padding: calc(12px + env(safe-area-inset-top)) 20px 20px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: calc(12px + env(safe-area-inset-top));
            left: 16px;
            width: 32px;
            height: 32px;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .training-title {
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 4px;
        }

        .training-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
        }

        /* Drill卡片 */
        .drill-list {
            padding: 16px;
            padding-bottom: 100px;
        }

        .drill-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
        }

        .drill-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .drill-number {
            width: 28px;
            height: 28px;
            background: var(--card-elevated);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .drill-card.completed .drill-number {
            background: var(--accent);
            color: #000;
        }

        .drill-title {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
        }

        .drill-time {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .drill-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
            padding-left: 40px;
        }

        .drill-check {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--card-elevated);
            border-radius: 10px;
            cursor: pointer;
            margin-left: 40px;
        }

        .check-circle {
            width: 22px;
            height: 22px;
            border: 2px solid var(--text-tertiary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
        }

        .drill-check.completed .check-circle {
            background: var(--accent);
            border-color: var(--accent);
        }

        .drill-check.completed {
            opacity: 0.6;
        }

        /* 完成按钮 */
        .complete-btn {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom));
            left: 16px;
            right: 16px;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .complete-btn:disabled {
            background: var(--card-elevated);
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        .complete-btn:not(:disabled):active {
            transform: scale(0.98);
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
        }

        .skill-input {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid var(--separator);
        }

        .skill-input:last-child {
            border-bottom: none;
        }

        .skill-name {
            font-size: 16px;
        }

        .skill-input input {
            width: 70px;
            padding: 8px 12px;
            background: var(--card-elevated);
            border: none;
            border-radius: 8px;
            color: var(--text);
            font-size: 16px;
            text-align: center;
        }

        .modal-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
        }

        /* 成功弹窗 */
        .success-modal .modal {
            text-align: center;
        }

        .success-icon {
            font-size: 60px;
            margin-bottom: 16px;
        }

        .xp-earned {
            background: var(--card-elevated);
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
        }

        .xp-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .xp-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <!-- Home Page -->
    <div id="home-page" class="page active">
        <div class="header">
            <h1>网球进阶教练</h1>
        </div>

        <div class="level-section">
            <div class="level-label">当前等级</div>
            <div class="level-value" id="current-level">2.50</div>
            <div class="level-target">目标: <span>3.50</span></div>
        </div>

        <div class="ios-progress">
            <div class="ios-progress-bar" id="level-progress" style="width: 0%"></div>
        </div>
        <div class="progress-labels">
            <span>2.0</span>
            <span>3.5</span>
        </div>

        <div class="stats-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-sessions">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="current-streak">0</div>
                    <div class="stat-label">连续打卡</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-hours">0</div>
                    <div class="stat-label">训练小时</div>
                </div>
            </div>
        </div>

        <div class="section-header">技能雷达</div>
        <div class="radar-section">
            <div class="radar-card">
                <div class="radar-container">
                    <svg class="radar-svg" viewBox="0 0 200 200">
                        <!-- 三个刻度圈 -->
                        <polygon points="100,90 105,95 105,105 100,110 95,105 95,95" fill="none" stroke="rgba(48,209,88,0.2)" stroke-width="0.5"/>
                        <polygon points="100,75 118,85 118,115 100,125 82,115 82,85" fill="none" stroke="rgba(142,142,147,0.4)" stroke-width="0.5" stroke-dasharray="4,4"/>
                        <polygon points="100,60 130,77 130,123 100,140 70,123 70,77" fill="none" stroke="rgba(48,209,88,0.4)" stroke-width="1"/>
                        
                        <!-- 刻度标签 -->
                        <text x="102" y="88" fill="rgba(48,209,88,0.6)" font-size="6">2.5</text>
                        <text x="120" y="83" fill="rgba(142,142,147,0.8)" font-size="6">3.0</text>
                        <text x="132" y="75" fill="rgba(48,209,88,0.8)" font-size="6">3.5</text>
                        
                        <!-- 轴线 -->
                        <line x1="100" y1="100" x2="100" y2="60" stroke="rgba(142,142,147,0.2)" stroke-width="0.5"/>
                        <line x1="100" y1="100" x2="130" y2="77" stroke="rgba(142,142,147,0.2)" stroke-width="0.5"/>
                        <line x1="100" y1="100" x2="130" y2="123" stroke="rgba(142,142,147,0.2)" stroke-width="0.5"/>
                        <line x1="100" y1="100" x2="100" y2="140" stroke="rgba(142,142,147,0.2)" stroke-width="0.5"/>
                        <line x1="100" y1="100" x2="70" y2="123" stroke="rgba(142,142,147,0.2)" stroke-width="0.5"/>
                        <line x1="100" y1="100" x2="70" y2="77" stroke="rgba(142,142,147,0.2)" stroke-width="0.5"/>
                        
                        <!-- 技能标签 -->
                        <text x="100" y="55" fill="var(--text-secondary)" font-size="9" text-anchor="middle">正手</text>
                        <text x="138" y="73" fill="var(--text-secondary)" font-size="9" text-anchor="start">反手</text>
                        <text x="138" y="130" fill="var(--text-secondary)" font-size="9" text-anchor="start">发球</text>
                        <text x="100" y="148" fill="var(--text-secondary)" font-size="9" text-anchor="middle">接发</text>
                        <text x="62" y="130" fill="var(--text-secondary)" font-size="9" text-anchor="end">截击</text>
                        <text x="62" y="73" fill="var(--text-secondary)" font-size="9" text-anchor="end">步法</text>
                        
                        <!-- 技能多边形 -->
                        <polygon id="skill-polygon" points="100,100 100,100 100,100 100,100 100,100 100,100" fill="rgba(48,209,88,0.25)" stroke="#30d158" stroke-width="2"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="section-header">今日训练</div>
        <div class="today-section">
            <div class="today-card" id="today-card">
                <div class="today-header">第 <span id="week-num">1</span> 周 · 第 <span id="session-num">1</span> 次</div>
                <div class="today-title" id="today-title">正手基础强化</div>
                <div class="today-subtitle" id="today-subtitle">稳定控球 · 身体发力</div>
                <button class="today-btn" id="start-btn" onclick="startTodayTraining()">开始训练</button>
            </div>
        </div>

        <div class="section-header">训练模块</div>
        <div class="modules-section">
            <div class="modules-grid">
                <div class="module-card forehand" onclick="showModule('forehand')">
                    <div class="module-icon">🎾</div>
                    <div class="module-name">正手</div>
                    <div class="module-desc">身体发力</div>
                </div>
                <div class="module-card backhand" onclick="showModule('backhand')">
                    <div class="module-icon">🎯</div>
                    <div class="module-name">反手</div>
                    <div class="module-desc">转胯发力</div>
                </div>
                <div class="module-card serve" onclick="showModule('serve')">
                    <div class="module-icon">🚀</div>
                    <div class="module-name">发球</div>
                    <div class="module-desc">抛球稳定</div>
                </div>
                <div class="module-card return" onclick="showModule('return')">
                    <div class="module-icon">⚡</div>
                    <div class="module-name">接发</div>
                    <div class="module-desc">向前送球</div>
                </div>
                <div class="module-card volley" onclick="showModule('volley')">
                    <div class="module-icon">🏃</div>
                    <div class="module-name">截击</div>
                    <div class="module-desc">手腕固定</div>
                </div>
                <div class="module-card fitness" onclick="showModule('fitness')">
                    <div class="module-icon">💪</div>
                    <div class="module-name">步法</div>
                    <div class="module-desc">移动速度</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Training Page -->
    <div id="training-page" class="page">
        <div class="training-header">
            <button class="back-btn" onclick="goBack()">‹</button>
            <div class="training-title" id="training-title">正手基础强化</div>
            <div class="training-subtitle" id="training-desc">稳定控球 · 身体发力</div>
        </div>
        <div class="drill-list" id="drill-list"></div>
        <button class="complete-btn" id="complete-btn" onclick="completeTraining()" disabled>完成训练</button>
    </div>

    <!-- Setup Modal -->
    <div class="modal-overlay" id="setup-modal">
        <div class="modal">
            <div class="modal-title">设置初始水平</div>
            <div class="skill-input">
                <span class="skill-name">🎾 正手</span>
                <input type="number" id="setup-forehand" value="2.5" min="2.0" max="3.5" step="0.1">
            </div>
            <div class="skill-input">
                <span class="skill-name">🎯 反手</span>
                <input type="number" id="setup-backhand" value="2.5" min="2.0" max="3.5" step="0.1">
            </div>
            <div class="skill-input">
                <span class="skill-name">🚀 发球</span>
                <input type="number" id="setup-serve" value="2.5" min="2.0" max="3.5" step="0.1">
            </div>
            <div class="skill-input">
                <span class="skill-name">⚡ 接发</span>
                <input type="number" id="setup-return" value="2.5" min="2.0" max="3.5" step="0.1">
            </div>
            <div class="skill-input">
                <span class="skill-name">🏃 截击</span>
                <input type="number" id="setup-volley" value="2.5" min="2.0" max="3.5" step="0.1">
            </div>
            <div class="skill-input">
                <span class="skill-name">💪 步法</span>
                <input type="number" id="setup-fitness" value="2.5" min="2.0" max="3.5" step="0.1">
            </div>
            <button class="modal-btn" onclick="saveSetup()">开始训练</button>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal-overlay success-modal" id="success-modal">
        <div class="modal">
            <div class="success-icon">🎉</div>
            <div class="modal-title">训练完成！</div>
            <div class="xp-earned">
                <div class="xp-label">获得经验</div>
                <div class="xp-value">+50 XP</div>
            </div>
            <button class="modal-btn" onclick="closeModal()">继续</button>
        </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('home')">
            <span class="tab-icon">🏠</span>
            <span>首页</span>
        </button>
        <button class="tab-btn" onclick="switchTab('progress')">
            <span class="tab-icon">📊</span>
            <span>进度</span>
        </button>
    </div>

    <script>
        // Training Data
        const trainingProgram = [
            { week: 1, session: 1, module: 'forehand', title: '正手基础强化', subtitle: '稳定控球 · 身体发力', drills: [
                { name: '小场对拉', duration: '15分钟', target: '连续20拍', desc: '在小场与搭档对拉，重点是控制而非力量。' },
                { name: '对墙击球', duration: '10分钟', target: '连续15个', desc: '距墙3-5米击球，练习节奏和球感。' },
                { name: '空挥练习', duration: '5分钟', target: '50次', desc: '无球挥拍，专注完整动作链。' }
            ]},
            { week: 1, session: 2, module: 'backhand', title: '反手基础训练', subtitle: '重心调整 · 转胯发力', drills: [
                { name: '手抛球练习', duration: '15分钟', target: '成功率80%', desc: '搭档手抛球，找最佳击球点。' },
                { name: '对墙反手', duration: '10分钟', target: '连续10个', desc: '只用反手对墙，体会左手带动。' },
                { name: '转体练习', duration: '5分钟', target: '30次', desc: '徒手转体，感受腰部发力。' }
            ]},
            { week: 1, session: 3, module: 'serve', title: '发球动作定型', subtitle: '抛球稳定 · 动作完整', drills: [
                { name: '抛球练习', duration: '10分钟', target: '20个好抛球', desc: '球垂直向上，落头顶前方。' },
                { name: '发球线发球', duration: '15分钟', target: '10个好球', desc: '发球线6成力量，重动作完整性。' },
                { name: '发球挥拍', duration: '5分钟', target: '30次', desc: '无球完整发球动作。' }
            ]}
        ];

        // State
        let state = JSON.parse(localStorage.getItem('tennisTrainerState')) || {
            currentWeek: 1,
            currentSession: 1,
            completedSessions: [],
            skillLevels: null,
            streak: 0,
            lastTrainingDate: null,
            totalHours: 0
        };

        let currentDrillsCompleted = [];

        function saveState() {
            localStorage.setItem('tennisTrainerState', JSON.stringify(state));
        }

        function getCurrentTraining() {
            return trainingProgram.find(t => t.week === state.currentWeek && t.session === state.currentSession);
        }

        function calculateOverallLevel() {
            if (!state.skillLevels) return 2.5;
            const levels = Object.values(state.skillLevels);
            const avg = levels.reduce((a, b) => a + b, 0) / levels.length;
            return avg.toFixed(2);
        }

        function updateRadarChart() {
            if (!state.skillLevels) return;
            
            const svg = document.getElementById('skill-polygon');
            const center = 100;
            const skills = ['forehand', 'backhand', 'serve', 'return', 'volley', 'fitness'];
            
            // 半径计算: 2.0-3.5 映射到 40-80像素
            const radiusFor = (level) => 40 + ((level - 2.0) / 1.5) * 40;
            
            const points = skills.map((skill, i) => {
                const angle = (Math.PI * 2 * i / 6) - Math.PI / 2;
                const radius = radiusFor(state.skillLevels[skill]);
                const x = center + radius * Math.cos(angle);
                const y = center + radius * Math.sin(angle);
                return `${x},${y}`;
            });
            
            svg.setAttribute('points', points.join(' '));
        }

        function renderHome() {
            document.getElementById('current-level').textContent = calculateOverallLevel();
            document.getElementById('level-progress').style.width = ((calculateOverallLevel() - 2.0) / 1.5 * 100) + '%';
            document.getElementById('total-sessions').textContent = state.completedSessions.length;
            document.getElementById('current-streak').textContent = state.streak;
            document.getElementById('total-hours').textContent = Math.floor(state.totalHours);
            
            const training = getCurrentTraining();
            if (training) {
                document.getElementById('week-num').textContent = training.week;
                document.getElementById('session-num').textContent = training.session;
                document.getElementById('today-title').textContent = training.title;
                document.getElementById('today-subtitle').textContent = training.subtitle;
            }
            
            updateRadarChart();
        }

        function showSetup() {
            document.getElementById('setup-modal').classList.add('active');
        }

        function saveSetup() {
            const clamp = (v) => Math.max(2.0, Math.min(3.5, parseFloat(v) || 2.5));
            
            state.skillLevels = {
                forehand: clamp(document.getElementById('setup-forehand').value),
                backhand: clamp(document.getElementById('setup-backhand').value),
                serve: clamp(document.getElementById('setup-serve').value),
                return: clamp(document.getElementById('setup-return').value),
                volley: clamp(document.getElementById('setup-volley').value),
                fitness: clamp(document.getElementById('setup-fitness').value)
            };
            
            saveState();
            document.getElementById('setup-modal').classList.remove('active');
            renderHome();
        }

        function startTodayTraining() {
            const training = getCurrentTraining();
            if (!training) return;
            
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('training-page').classList.add('active');
            
            document.getElementById('training-title').textContent = training.title;
            document.getElementById('training-desc').textContent = training.subtitle;
            
            const list = document.getElementById('drill-list');
            list.innerHTML = '';
            currentDrillsCompleted = new Array(training.drills.length).fill(false);
            
            training.drills.forEach((drill, i) => {
                const card = document.createElement('div');
                card.className = 'drill-card';
                card.id = `drill-${i}`;
                card.innerHTML = `
                    <div class="drill-header">
                        <div class="drill-number">${i + 1}</div>
                        <div class="drill-title">${drill.name}</div>
                        <div class="drill-time">${drill.duration}</div>
                    </div>
                    <div class="drill-desc">${drill.desc}</div>
                    <div class="drill-check" onclick="toggleDrill(${i})">
                        <div class="check-circle"></div>
                        <span>完成此练习</span>
                    </div>
                `;
                list.appendChild(card);
            });
            
            updateCompleteBtn();
        }

        function toggleDrill(index) {
            currentDrillsCompleted[index] = !currentDrillsCompleted[index];
            
            const card = document.getElementById(`drill-${index}`);
            const check = card.querySelector('.drill-check');
            
            if (currentDrillsCompleted[index]) {
                card.classList.add('completed');
                check.classList.add('completed');
                check.querySelector('.check-circle').innerHTML = '✓';
            } else {
                card.classList.remove('completed');
                check.classList.remove('completed');
                check.querySelector('.check-circle').innerHTML = '';
            }
            
            updateCompleteBtn();
        }

        function updateCompleteBtn() {
            const btn = document.getElementById('complete-btn');
            const allDone = currentDrillsCompleted.every(v => v);
            btn.disabled = !allDone;
            btn.textContent = allDone ? '完成训练 ✓' : `完成 ${currentDrillsCompleted.filter(v=>v).length}/${currentDrillsCompleted.length}`;
        }

        function completeTraining() {
            const training = getCurrentTraining();
            if (!training) return;
            
            state.completedSessions.push({
                week: training.week,
                session: training.session,
                module: training.module,
                date: new Date().toISOString()
            });
            
            // 提升技能
            if (state.skillLevels) {
                state.skillLevels[training.module] = Math.min(3.5, state.skillLevels[training.module] + 0.03);
            }
            
            // 连续打卡
            const today = new Date().toDateString();
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            const lastDate = state.lastTrainingDate ? new Date(state.lastTrainingDate).toDateString() : null;
            
            if (lastDate === yesterday.toDateString()) {
                state.streak++;
            } else if (lastDate !== today) {
                state.streak = 1;
            }
            
            state.lastTrainingDate = new Date().toISOString();
            state.totalHours += 0.75;
            
            // 推进到下一次
            const currentIndex = trainingProgram.findIndex(t => t.week === state.currentWeek && t.session === state.currentSession);
            if (currentIndex < trainingProgram.length - 1) {
                const next = trainingProgram[currentIndex + 1];
                state.currentWeek = next.week;
                state.currentSession = next.session;
            }
            
            saveState();
            
            // 震动
            if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
            
            document.getElementById('success-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('success-modal').classList.remove('active');
            goBack();
            renderHome();
        }

        function goBack() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('home-page').classList.add('active');
        }

        function showModule(module) {
            startTodayTraining();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (!state.skillLevels) {
                showSetup();
            } else {
                renderHome();
            }
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
        });
    </script>
</body>
</html>
