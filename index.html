<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e3a5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>网球进阶教练</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-hover: #334155;
            --accent: #4ade80;
            --accent-dark: #22c55e;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #152a45 100%);
            padding: calc(16px + env(safe-area-inset-top)) 20px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .level-section { padding: 24px 20px; text-align: center; }
        .level-label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
        .level-value { font-size: 48px; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
        .level-target { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
        .level-target span { color: var(--accent); }
        .progress-bar { height: 6px; background: var(--card); border-radius: 3px; margin: 16px 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
        .section-title { padding: 20px 20px 12px; font-size: 16px; font-weight: 600; }
        .radar-card {
            background: var(--card);
            margin: 0 16px;
            border-radius: 16px;
            padding: 20px;
        }
        .radar-container {
            position: relative;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            aspect-ratio: 1;
        }
        .radar-svg { width: 100%; height: 100%; }
        .today-card {
            background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
            margin: 16px;
            border-radius: 16px;
            padding: 20px;
        }
        .today-header { font-size: 13px; opacity: 0.9; margin-bottom: 8px; }
        .today-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .today-subtitle { font-size: 14px; opacity: 0.85; margin-bottom: 16px; }
        .today-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 10px;
            color: #0f172a;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .setup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .setup-overlay.active { display: flex; }
        .setup-modal {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
        }
        .setup-title { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 20px; }
        .skill-input { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .skill-input:last-child { border-bottom: none; }
        .skill-name { font-size: 15px; }
        .skill-input input {
            width: 60px;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: var(--text);
            font-size: 16px;
            text-align: center;
        }
        .setup-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #0f172a;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header"><h1>网球进阶教练</h1></div>

    <div class="level-section">
        <div class="level-label">当前等级</div>
        <div class="level-value" id="current-level">2.50</div>
        <div class="level-target">目标等级 <span>3.50</span></div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="level-progress" style="width: 33%"></div></div>

    <div class="section-title">技能雷达</div>
    <div class="radar-card">
        <div class="radar-container">
            <svg class="radar-svg" viewBox="0 0 200 180">
                <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.3"/><stop offset="100%" style="stop-color:#4ade80;stop-opacity:0.1"/></linearGradient></defs>
                
                <!-- 三个圈：2.5（虚线）、3.0（点线）、3.5（实线） -->
                <polygon points="100,70 115,80 115,100 100,110 85,100 85,80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
                <polygon points="100,55 130,72 130,108 100,125 70,108 70,72" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="1,2"/>
                <polygon points="100,40 145,65 145,115 100,140 55,115 55,65" fill="none" stroke="#4ade80" stroke-width="1.5"/>
                
                <!-- 轴线 -->
                <line x1="100" y1="100" x2="100" y2="40" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="145" y2="65" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="145" y2="115" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="100" y2="140" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="55" y2="115" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="55" y2="65" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                
                <!-- 技能多边形 -->
                <polygon id="skill-polygon" points="100,55 145,72 145,108 100,125 55,108 55,72" fill="url(#g)" stroke="#4ade80" stroke-width="2"/>
                
                <!-- 刻度标签 - 放在不重叠的位置 -->
                <text x="148" y="68" fill="#4ade80" font-size="8">3.5</text>
                <text x="133" y="75" fill="#94a3b8" font-size="7">3.0</text>
                <text x="118" y="82" fill="#64748b" font-size="6">2.5</text>
                
                <!-- 技能名称 - 放在轴线末端 -->
                <text x="100" y="35" fill="#f8fafc" font-size="10" text-anchor="middle">正手</text>
                <text x="152" y="62" fill="#f8fafc" font-size="10" text-anchor="start">反手</text>
                <text x="152" y="120" fill="#f8fafc" font-size="10" text-anchor="start">发球</text>
                <text x="100" y="150" fill="#f8fafc" font-size="10" text-anchor="middle">接发</text>
                <text x="48" y="120" fill="#f8fafc" font-size="10" text-anchor="end">截击</text>
                <text x="48" y="62" fill="#f8fafc" font-size="10" text-anchor="end">步法</text>
            </svg>
        </div>
    </div>

    <div class="today-card" onclick="startTraining()">
        <div class="today-header">第 <span id="week-num">1</span> 周 · 第 <span id="session-num">1</span> 次</div>
        <div class="today-title" id="today-title">正手基础强化</div>
        <div class="today-subtitle" id="today-subtitle">稳定控球 · 身体发力</div>
        <button class="today-btn">开始训练 →</button>
    </div>

    <!-- 设置弹窗 -->
    <div class="setup-overlay" id="setup-modal">
        <div class="setup-modal">
            <div class="setup-title">设置初始水平</div>
            <div class="skill-input"><span class="skill-name">🎾 正手</span><input type="number" id="s-forehand" value="2.5" min="2" max="3.5" step="0.1"></div>
            <div class="skill-input"><span class="skill-name">🎯 反手</span><input type="number" id="s-backhand" value="2.5" min="2" max="3.5" step="0.1"></div>
            <div class="skill-input"><span class="skill-name">🚀 发球</span><input type="number" id="s-serve" value="2.5" min="2" max="3.5" step="0.1"></div>
            <div class="skill-input"><span class="skill-name">⚡ 接发</span><input type="number" id="s-return" value="2.5" min="2" max="3.5" step="0.1"></div>
            <div class="skill-input"><span class="skill-name">🏃 截击</span><input type="number" id="s-volley" value="2.5" min="2" max="3.5" step="0.1"></div>
            <div class="skill-input"><span class="skill-name">💪 步法</span><input type="number" id="s-fitness" value="2.5" min="2" max="3.5" step="0.1"></div>
            <button class="setup-btn" onclick="saveSetup()">开始训练</button>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('t')) || { lvl: null, w: 1, s: 1 };
        function save() { localStorage.setItem('t', JSON.stringify(state)); }
        function calc() {
            if (!state.lvl) return 2.5;
            return (Object.values(state.lvl).reduce((a,b)=>a+b,0)/6).toFixed(2);
        }
        function update() {
            document.getElementById('current-level').textContent = calc();
            document.getElementById('level-progress').style.width = ((calc()-2)/1.5*100)+'%';
            if (state.lvl) {
                const r = [55,72,108,125], c = [100,145,145,100,55,55];
                const v = Object.values(state.lvl);
                const p = v.map((x,i) => {
                    const d = 40 + (x-2)/1.5 * 50;
                    const a = (Math.PI*2*i/6) - Math.PI/2;
                    return `${100+d*Math.cos(a)},${100+d*Math.sin(a)}`;
                });
                document.getElementById('skill-polygon').setAttribute('points', p.join(' '));
            }
        }
        function saveSetup() {
            state.lvl = {
                forehand: +document.getElementById('s-forehand').value,
                backhand: +document.getElementById('s-backhand').value,
                serve: +document.getElementById('s-serve').value,
                return: +document.getElementById('s-return').value,
                volley: +document.getElementById('s-volley').value,
                fitness: +document.getElementById('s-fitness').value
            };
            save();
            document.getElementById('setup-modal').classList.remove('active');
            update();
        }
        function startTraining() {
            alert('训练功能开发中...');
        }
        if (!state.lvl) document.getElementById('setup-modal').classList.add('active');
        else update();
    </script>
</body>
</html>
