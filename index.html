<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e3a5f">
    <title>网球进阶教练</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #152a45 100%);
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .level-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 12px;
        }
        .level-badge .progress {
            width: 100px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
        }
        .level-badge .progress-bar {
            height: 100%;
            background: #4ade80;
            border-radius: 3px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 16px;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
        }
        .stat-card .number { font-size: 28px; font-weight: 700; color: #4ade80; }
        .stat-card .label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .section-title {
            padding: 20px 16px 12px;
            font-size: 18px;
            font-weight: 600;
        }
        .radar-card {
            background: #1e293b;
            margin: 0 16px 16px;
            border-radius: 16px;
            padding: 20px;
        }
        .radar-container { width: 100%; max-width: 260px; margin: 0 auto; }
        .radar-svg { width: 100%; height: auto; }
        .today-card {
            background: linear-gradient(135deg, #22c55e 0%, #4ade80 100%);
            margin: 0 16px 16px;
            border-radius: 16px;
            padding: 20px;
        }
        .today-card h3 { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
        .today-card .title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .today-card .subtitle { font-size: 14px; opacity: 0.85; margin-bottom: 16px; }
        .start-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 10px;
            color: #0f172a;
            font-size: 16px;
            font-weight: 600;
        }
        .module-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
        }
        .module-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 16px;
        }
        .module-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .module-card h4 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .module-card p { font-size: 12px; color: #94a3b8; }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 12px 0 28px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .tab-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 12px;
        }
        .tab-btn.active { color: #4ade80; }
    </style>
</head>
<body>
    <div class="header">
        <h1>网球进阶教练</h1>
        <div class="level-badge">
            <span>等级</span>
            <span id="level">2.5</span>
            <div class="progress"><div class="progress-bar" id="progress" style="width: 33%"></div></div>
            <span>3.5</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="number" id="completed">0</div>
            <div class="label">已完成训练</div>
        </div>
        <div class="stat-card">
            <div class="number" id="streak">0</div>
            <div class="label">连续打卡</div>
        </div>
        <div class="stat-card">
            <div class="number" id="hours">0</div>
            <div class="label">训练小时</div>
        </div>
    </div>

    <div class="section-title">技能雷达</div>
    <div class="radar-card">
        <div class="radar-container">
            <svg class="radar-svg" viewBox="0 0 200 180">
                <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.3"/><stop offset="100%" style="stop-color:#4ade80;stop-opacity:0.1"/></linearGradient></defs>
                <polygon points="100,70 120,82 120,110 100,122 80,110 80,82" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                <polygon points="100,55 135,75 135,117 100,137 65,117 65,75" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
                <polygon points="100,40 150,69 150,123 100,152 50,123 50,69" fill="none" stroke="#4ade80" stroke-width="1"/>
                <line x1="100" y1="100" x2="100" y2="40" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="150" y2="69" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="150" y2="123" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="100" y2="152" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="50" y2="123" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="50" y2="69" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
                <polygon id="radar-area" points="100,70 120,82 120,110 100,122 80,110 80,82" fill="url(#g)" stroke="#4ade80" stroke-width="2"/>
                <text x="100" y="32" fill="#f8fafc" font-size="11" text-anchor="middle">正手</text>
                <text x="158" y="65" fill="#f8fafc" font-size="11" text-anchor="start">反手</text>
                <text x="158" y="132" fill="#f8fafc" font-size="11" text-anchor="start">发球</text>
                <text x="100" y="165" fill="#f8fafc" font-size="11" text-anchor="middle">接发</text>
                <text x="42" y="132" fill="#f8fafc" font-size="11" text-anchor="end">截击</text>
                <text x="42" y="65" fill="#f8fafc" font-size="11" text-anchor="end">步法</text>
            </svg>
        </div>
    </div>

    <div class="section-title">今日训练</div>
    <div class="today-card">
        <h3>第 1 周 · 第 1 次</h3>
        <div class="title">正手基础强化</div>
        <div class="subtitle">稳定控球 · 身体发力</div>
        <button class="start-btn" onclick="alert('功能开发中')">开始训练</button>
    </div>

    <div class="section-title">训练模块</div>
    <div class="module-grid">
        <div class="module-card"><div class="module-icon" style="background:rgba(239,68,68,0.2)">🎾</div><h4>正手</h4><p>身体发力 · 稳定控球</p></div>
        <div class="module-card"><div class="module-icon" style="background:rgba(59,130,246,0.2)">🎯</div><h4>反手</h4><p>重心调整 · 转胯发力</p></div>
        <div class="module-card"><div class="module-icon" style="background:rgba(168,85,247,0.2)">🚀</div><h4>发球</h4><p>抛球稳定 · 动作完整</p></div>
        <div class="module-card"><div class="module-icon" style="background:rgba(245,158,11,0.2)">⚡</div><h4>接发球</h4><p>垫步准备 · 向前送球</p></div>
        <div class="module-card"><div class="module-icon" style="background:rgba(34,197,94,0.2)">🏃</div><h4>截击</h4><p>手腕固定 · 迎球上网</p></div>
        <div class="module-card"><div class="module-icon" style="background:rgba(236,72,153,0.2)">💪</div><h4>体能</h4><p>步法训练 · 移动速度</p></div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active"><span style="font-size:20px">🏠</span><span>首页</span></button>
        <button class="tab-btn" onclick="alert('功能开发中')"><span style="font-size:20px">📊</span><span>进度</span></button>
    </div>

    <script>
        // 加载保存的数据
        const saved = localStorage.getItem('tennisData');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('level').textContent = data.level || '2.5';
            document.getElementById('completed').textContent = data.completed || '0';
            document.getElementById('streak').textContent = data.streak || '0';
            document.getElementById('hours').textContent = data.hours || '0';
            if (data.progress) {
                document.getElementById('progress').style.width = data.progress + '%';
            }
        }
    </script>
</body>
</html>
