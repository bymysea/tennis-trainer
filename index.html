<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>网球进阶教练</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #aeaeb2;
            --accent: #34c759;
            --accent-light: #e8f5e9;
            --orange: #ff9500;
            --blue: #007aff;
            --separator: rgba(0,0,0,0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 90px;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: var(--surface);
            padding: calc(12px + env(safe-area-inset-top)) 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .header-action {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            position: relative;
        }

        .header-action .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 18px;
            height: 18px;
            background: #ff3b30;
            color: white;
            font-size: 11px;
            font-weight: 600;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Stats Card */
        .stats-card {
            background: var(--surface);
            margin: 12px 16px;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .level-display {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .level-number {
            font-size: 56px;
            font-weight: 300;
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--text-primary);
        }

        .level-unit {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .level-status {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .level-status span {
            color: var(--accent);
            font-weight: 500;
        }

        .charge-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 14px;
            background: var(--accent-light);
            border-radius: 16px;
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
        }

        .charge-btn::before {
            content: '⚡';
        }

        /* Progress Bar */
        .progress-container {
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            height: 6px;
            background: rgba(0,0,0,0.06);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, #30d158 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* Radar Section - Center Focus */
        .radar-section {
            background: var(--surface);
            margin: 12px 16px;
            border-radius: 20px;
            padding: 24px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .radar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .radar-title {
            font-size: 17px;
            font-weight: 600;
        }

        .radar-status {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .radar-container {
            position: relative;
            width: 100%;
            max-width: 260px;
            margin: 0 auto;
            aspect-ratio: 1;
        }

        .radar-svg {
            width: 100%;
            height: 100%;
        }

        /* Skill Points Around Radar */
        .skill-point {
            position: absolute;
            text-align: center;
        }

        .skill-point .value {
            font-size: 20px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1;
        }

        .skill-point .label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .skill-point .status {
            font-size: 10px;
            color: var(--accent);
        }

        /* Quick Actions Grid */
        .actions-section {
            padding: 8px 16px 20px;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px 4px;
        }

        .action-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .action-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Info Cards */
        .info-cards {
            padding: 0 16px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .info-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .info-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .info-card-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .info-card-title {
            font-size: 15px;
            font-weight: 500;
        }

        .info-card-value {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: -0.02em;
        }

        .info-card-sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .icon-blue { background: rgba(0,122,255,0.1); }
        .icon-orange { background: rgba(255,149,0,0.1); }
        .icon-green { background: rgba(52,199,89,0.1); }
        .icon-red { background: rgba(255,59,48,0.1); }

        /* Bottom Sheet */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            z-index: 200;
        }

        .sheet-header {
            width: 36px;
            height: 4px;
            background: var(--separator);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        /* Setup Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: flex-end;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-sheet {
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 16px 20px calc(24px + env(safe-area-inset-bottom));
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 24px;
            padding-top: 8px;
        }

        .skill-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 0.5px solid var(--separator);
        }

        .skill-row:last-child {
            border-bottom: none;
        }

        .skill-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .skill-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .skill-name-text {
            font-size: 16px;
            font-weight: 500;
        }

        .skill-input {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .skill-input button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--bg);
            font-size: 18px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .skill-input .value {
            font-size: 22px;
            font-weight: 500;
            min-width: 50px;
            text-align: center;
        }

        .modal-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            margin-top: 24px;
            cursor: pointer;
        }

        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            border-top: 0.5px solid var(--separator);
            z-index: 100;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .tab-icon {
            width: 28px;
            height: 28px;
            opacity: 0.4;
        }

        .tab-item.active .tab-icon {
            opacity: 1;
        }

        .tab-label {
            font-size: 10px;
            color: var(--text-tertiary);
        }

        .tab-item.active .tab-label {
            color: var(--accent);
        }

        /* Page */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Home Page -->
    <div id="home-page" class="page active">
        <div class="header">
            <div class="header-title">网球进阶教练</div>
            <div class="header-action">
                🔔
                <span class="badge">3</span>
            </div>
        </div>

        <div class="stats-card">
            <div class="stats-header">
                <div>
                    <div class="level-display">
                        <span class="level-number" id="current-level">2.50</span>
                        <span class="level-unit">级</span>
                    </div>
                    <div class="level-status">目标等级 <span>3.50</span></div>
                </div>
                <div class="charge-btn">开始训练</div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="level-progress" style="width: 33%"></div>
                </div>
                <div class="progress-labels">
                    <span>2.0</span>
                    <span>电量 33%</span>
                    <span>3.5</span>
                </div>
            </div>
        </div>

        <div class="radar-section">
            <div class="radar-header">
                <div class="radar-title">技能雷达</div>
                <div class="radar-status">更新于 今天 22:09</div>
            </div>
            
            <div class="radar-container" id="radar-container">
                <svg class="radar-svg" viewBox="0 0 200 200">
                    <defs>
                        <linearGradient id="radarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#34c759;stop-opacity:0.3"/>
                            <stop offset="100%" style="stop-color:#30d158;stop-opacity:0.1"/>
                        </linearGradient>
                    </defs>
                    
                    <!-- 三圈刻度 -->
                    <circle cx="100" cy="100" r="25" fill="none" stroke="#e5e5ea" stroke-width="1"/>
                    <circle cx="100" cy="100" r="50" fill="none" stroke="#e5e5ea" stroke-width="1" stroke-dasharray="4,4"/>
                    <circle cx="100" cy="100" r="75" fill="none" stroke="#34c759" stroke-width="1.5"/>
                    
                    <!-- 轴线 -->
                    <line x1="100" y1="100" x2="100" y2="25" stroke="#e5e5ea" stroke-width="1"/>
                    <line x1="100" y1="100" x2="165" y2="62.5" stroke="#e5e5ea" stroke-width="1"/>
                    <line x1="100" y1="100" x2="165" y2="137.5" stroke="#e5e5ea" stroke-width="1"/>
                    <line x1="100" y1="100" x2="100" y2="175" stroke="#e5e5ea" stroke-width="1"/>
                    <line x1="100" y1="100" x2="35" y2="137.5" stroke="#e5e5ea" stroke-width="1"/>
                    <line x1="100" y1="100" x2="35" y2="62.5" stroke="#e5e5ea" stroke-width="1"/>
                    
                    <!-- 技能多边形 -->
                    <polygon id="skill-polygon" points="100,55 147,78 147,122 100,145 53,122 53,78" 
                             fill="url(#radarGradient)" stroke="#34c759" stroke-width="2"/>
                    
                    <!-- 刻度标签 -->
                    <text x="102" y="22" fill="#aeaeb2" font-size="7">3.5</text>
                    <text x="102" y="47" fill="#86868b" font-size="7">3.0</text>
                    <text x="102" y="72" fill="#c7c7cc" font-size="7">2.5</text>
                </svg>
                
                <!-- 四周数据点 -->
                <div class="skill-point" style="top: 0; left: 50%; transform: translateX(-50%);">
                    <div class="value">2.65</div>
                    <div class="label">正手</div>
                    <div class="status">正常</div>
                </div>
                
                <div class="skill-point" style="top: 25%; right: 0;">
                    <div class="value">2.50</div>
                    <div class="label">反手</div>
                    <div class="status">正常</div>
                </div>
                
                <div class="skill-point" style="bottom: 25%; right: 0;">
                    <div class="value">2.53</div>
                    <div class="label">发球</div>
                    <div class="status">正常</div>
                </div>
                
                <div class="skill-point" style="bottom: 0; left: 50%; transform: translateX(-50%);">
                    <div class="value">2.50</div>
                    <div class="label">接发</div>
                    <div class="status">正常</div>
                </div>
                
                <div class="skill-point" style="bottom: 25%; left: 0;">
                    <div class="value">2.50</div>
                    <div class="label">截击</div>
                    <div class="status">正常</div>
                </div>
                
                <div class="skill-point" style="top: 25%; left: 0;">
                    <div class="value">2.50</div>
                    <div class="label">步法</div>
                    <div class="status">正常</div>
                </div>
            </div>
        </div>

        <div class="actions-section">
            <div class="actions-grid">
                <div class="action-item">
                    <div class="action-icon">🔒</div>
                    <div class="action-label">打卡</div>
                </div>
                <div class="action-item">
                    <div class="action-icon">📅</div>
                    <div class="action-label">计划</div>
                </div>
                <div class="action-item">
                    <div class="action-icon">📊</div>
                    <div class="action-label">统计</div>
                </div>
                <div class="action-item">
                    <div class="action-icon">🏆</div>
                    <div class="action-label">成就</div>
                </div>
                <div class="action-item">
                    <div class="action-icon">⚙️</div>
                    <div class="action-label">设置</div>
                </div>
            </div>
        </div>

        <div class="info-cards">
            <div class="info-card">
                <div class="info-card-header">
                    <div class="info-card-icon icon-blue">❄️</div>
                    <div class="info-card-title">连续</div>
                </div>
                <div class="info-card-value">5</div>
                <div class="info-card-sub">天打卡</div>
            </div>
            
            <div class="info-card">
                <div class="info-card-header">
                    <div class="info-card-icon icon-orange">📍</div>
                    <div class="info-card-title">进度</div>
                </div>
                <div class="info-card-value">12</div>
                <div class="info-card-sub">次训练 · 第2周</div>
            </div>
        </div>
    </div>

    <!-- Setup Modal -->
    <div class="modal-overlay" id="setup-modal">
        <div class="modal-sheet">
            <div class="sheet-header"></div>
            <div class="modal-title">设置初始水平</div>
            
            <div class="skill-row">
                <div class="skill-info">
                    <div class="skill-icon icon-green">🎾</div>
                    <div class="skill-name-text">正手</div>
                </div>
                <div class="skill-input">
                    <button onclick="adjustSkill('forehand', -0.1)">−</button>
                    <div class="value" id="forehand-val">2.5</div>
                    <button onclick="adjustSkill('forehand', 0.1)">+</button>
                </div>
            </div>
            
            <div class="skill-row">
                <div class="skill-info">
                    <div class="skill-icon icon-blue">🎯</div>
                    <div class="skill-name-text">反手</div>
                </div>
                <div class="skill-input">
                    <button onclick="adjustSkill('backhand', -0.1)">−</button>
                    <div class="value" id="backhand-val">2.5</div>
                    <button onclick="adjustSkill('backhand', 0.1)">+</button>
                </div>
            </div>
            
            <div class="skill-row">
                <div class="skill-info">
                    <div class="skill-icon icon-orange">🚀</div>
                    <div class="skill-name-text">发球</div>
                </div>
                <div class="skill-input">
                    <button onclick="adjustSkill('serve', -0.1)">−</button>
                    <div class="value" id="serve-val">2.5</div>
                    <button onclick="adjustSkill('serve', 0.1)">+</button>
                </div>
            </div>
            
            <div class="skill-row">
                <div class="skill-info">
                    <div class="skill-icon icon-red">⚡</div>
                    <div class="skill-name-text">接发</div>
                </div>
                <div class="skill-input">
                    <button onclick="adjustSkill('return', -0.1)">−</button>
                    <div class="value" id="return-val">2.5</div>
                    <button onclick="adjustSkill('return', 0.1)">+</button>
                </div>
            </div>
            
            <div class="skill-row">
                <div class="skill-info">
                    <div class="skill-icon icon-green">🏃</div>
                    <div class="skill-name-text">截击</div>
                </div>
                <div class="skill-input">
                    <button onclick="adjustSkill('volley', -0.1)">−</button>
                    <div class="value" id="volley-val">2.5</div>
                    <button onclick="adjustSkill('volley', 0.1)">+</button>
                </div>
            </div>
            
            <div class="skill-row">
                <div class="skill-info">
                    <div class="skill-icon icon-blue">💪</div>
                    <div class="skill-name-text">步法</div>
                </div>
                <div class="skill-input">
                    <button onclick="adjustSkill('fitness', -0.1)">−</button>
                    <div class="value" id="fitness-val">2.5</div>
                    <button onclick="adjustSkill('fitness', 0.1)">+</button>
                </div>
            </div>
            
            <button class="modal-btn" onclick="saveSetup()">开始训练</button>
        </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="tab-item active">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            <span class="tab-label">爱车</span>
        </button>
        <button class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
            </svg>
            <span class="tab-label">发现</span>
        </button>
        <button class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 7V4h3M4 17v3h3M20 7V4h-3M20 17v3h-3M9 9h6v6H9z"/>
            </svg>
            <span class="tab-label">精选</span>
        </button>
        <button class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 7h-9M20 11h-9M20 15h-9M4 7h2v2H4zm0 4h2v2H4zm0 4h2v2H4z"/>
            </svg>
            <span class="tab-label">服务</span>
        </button>
        <button class="tab-item">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="tab-label">我的</span>
        </button>
    </div>

    <script>
        let tempSkills = {
            forehand: 2.5,
            backhand: 2.5,
            serve: 2.5,
            return: 2.5,
            volley: 2.5,
            fitness: 2.5
        };

        function adjustSkill(skill, delta) {
            tempSkills[skill] = Math.max(2.0, Math.min(3.5, tempSkills[skill] + delta));
            document.getElementById(skill + '-val').textContent = tempSkills[skill].toFixed(1);
        }

        function saveSetup() {
            localStorage.setItem('tennisSkills', JSON.stringify(tempSkills));
            document.getElementById('setup-modal').classList.remove('active');
            updateDisplay();
        }

        function updateDisplay() {
            const saved = localStorage.getItem('tennisSkills');
            if (saved) {
                const skills = JSON.parse(saved);
                const avg = Object.values(skills).reduce((a,b) => a+b, 0) / 6;
                document.getElementById('current-level').textContent = avg.toFixed(2);
            }
        }

        // Show setup on first visit
        if (!localStorage.getItem('tennisSkills')) {
            document.getElementById('setup-modal').classList.add('active');
        } else {
            updateDisplay();
        }
    </script>
</body>
</html>
